name: quicklify
description: "One-tap video downloader for YouTube, TikTok, Facebook, Instagram & more."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State management
  provider: ^6.1.2

  # Networking
  dio: ^5.7.0

  # Local storage
  sqflite: ^2.4.1
  path_provider: ^2.1.5
  path: ^1.9.1
  shared_preferences: ^2.3.4

  # Clipboard & share intent
  receive_sharing_intent: ^1.8.1

  # Permissions
  permission_handler: ^11.3.1

  # Notifications
  flutter_local_notifications: ^18.0.1

  # UI
  google_fonts: ^6.2.1
  shimmer: ^3.0.0
  fluttertoast: ^8.2.10

  # YouTube on-device extraction
  youtube_explode_dart: ^2.3.8

  # Utilities
  uuid: ^4.5.1
  intl: ^0.19.0
  url_launcher: ^6.3.1
  open_filex: ^4.7.0

  # Ads (AdMob)
  google_mobile_ads: ^5.2.0

  # In-app video playback
  video_player: ^2.9.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
